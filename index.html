<!DOCTYPE html>
<html>
<head>
<title>Smart Closing Monitor</title>

<style>
body {
  background:#0b0f14;
  color:white;
  font-family:Arial;
  padding:20px;
}

.kpi {
  font-size:24px;
  margin-bottom:30px;
}

.timeline {
  position:relative;
  height:120px;
  border-top:2px solid #888;
  margin-bottom:40px;
}

.progress {
  position:absolute;
  top:-2px;
  height:3px;
  background:#00c3ff;
  width:0%;
}

.now {
  position:absolute;
  top:-10px;
  border-left:3px solid #00c3ff;
  height:100px;
}

.label {
  position:absolute;
  top:15px;
  font-size:12px;
}

.card {
  background:#111;
  padding:10px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<h1>SMART CLOSING – EXECUTION MONITOR</h1>

<div class="kpi" id="kpi">Loading...</div>

<div class="timeline">
  <div id="progress" class="progress"></div>
  <div id="now" class="now"></div>

  <div class="label" style="left:0%">WD-3</div>
  <div class="label" style="left:15%">WD-1</div>
  <div class="label" style="left:30%">WD1</div>
  <div class="label" style="left:45%">WD2</div>
  <div class="label" style="left:60%">WD3</div>
  <div class="label" style="left:75%">WD4</div>
  <div class="label" style="left:90%">WD5</div>
</div>

<div id="cards"></div>

<script>

const CURRENT_WD = 3;

// ✅ mapa timeline FIXO
function wdToPosition(wd){
  const map = {
    "-7":0,
    "-5":5,
    "-3":10,
    "-2":15,
    "-1":20,
    "1":30,
    "2":45,
    "3":60,
    "4":70,
    "5":80,
    "6":85,
    "7":88,
    "8":90,
    "9":92,
    "10":94,
    "11":96,
    "12":97,
    "13":98,
    "14":99,
    "20":100
  };
  return map[wd] ?? 0;
}

fetch("monitor_data.csv")
.then(r=>r.text())
.then(text=>{

  const rows = text.trim().split(/\r?\n/);
  rows.shift();

  let data = [];

  rows.forEach(row=>{
    const p = row.split(",");
    if(p.length<3) return;

    data.push({
      process:p[0].trim(),
      wd:Number(p[1]),
      expected:Number(p[2])
    });
  });

  // pegar último WD por processo
  let latest={};

  data.forEach(d=>{
    if(d.wd<=CURRENT_WD){
      if(!latest[d.process] || d.wd>latest[d.process].wd){
        latest[d.process]=d;
      }
    }
  });

  let final = Object.values(latest);

  // ✅ KPI correto
  let global = Math.round(
    final.reduce((s,d)=>s+d.expected,0)/final.length
  );

  document.getElementById("kpi").innerText =
    "Expected: "+global+"%";

  // ✅ ✅ CORREÇÃO PRINCIPAL AQUI
  let progressPos = wdToPosition(CURRENT_WD);

  document.getElementById("progress").style.width =
    progressPos + "%";

  document.getElementById("now").style.left =
    progressPos + "%";

  // cards
  let div=document.getElementById("cards");
  div.innerHTML="";

  final.forEach(d=>{
    let el=document.createElement("div");
    el.className="card";
    el.innerText=d.process+" → "+d.expected+"%";
    div.appendChild(el);
  });

});

</script>

</body>
</html>
``
