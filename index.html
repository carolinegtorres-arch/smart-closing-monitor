<!DOCTYPE html>
<html>
<head>
  <title>Smart Closing Monitor</title>

<style>
body {
  background:#0b0f14;
  color:white;
  font-family:Arial;
  padding:20px;
}

/* KPI */
.kpi {
  margin-bottom:20px;
  font-size:20px;
}

/* TIMELINE */
.timeline {
  position:relative;
  height:140px;
  margin:40px 0;
}

/* linha base */
.axis {
  position:absolute;
  top:70px;
  width:100%;
  border-top:2px solid #888;
}

/* linha progress */
.progress {
  position:absolute;
  top:72px;
  border-top:4px solid #00c3ff;
  width:0%;
}

/* marcador NOW */
.now {
  position:absolute;
  top:20px;
  border-left:3px solid #00c3ff;
  height:100px;
}

/* WD labels */
.wd {
  position:absolute;
  top:90px;
  font-size:12px;
}

/* CARDS */
.cards {
  margin-top:30px;
}

.card {
  margin:10px 0;
  padding:10px;
  background:#111;
}
</style>
</head>

<body>

<h1>SMART CLOSING – EXECUTION MONITOR</h1>

<div class="kpi" id="kpi">Loading...</div>

<div class="timeline">

  <div class="axis"></div>
  <div class="progress" id="progress"></div>
  <div class="now" id="now"></div>

  <!-- labels WD -->
  <div class="wd" style="left:0%">WD-3</div>
  <div class="wd" style="left:15%">WD-1</div>
  <div class="wd" style="left:30%">WD1</div>
  <div class="wd" style="left:45%">WD2</div>
  <div class="wd" style="left:60%">WD3</div>
  <div class="wd" style="left:75%">WD4</div>
  <div class="wd" style="left:90%">WD5</div>

</div>

<div class="cards" id="cards"></div>

<script>

const CURRENT_WD = 3;

// mapa simples WD -> posição (%) na timeline
function wdToPercent(wd){
  const map = {
    "-3":0,
    "-2":5,
    "-1":10,
    "1":30,
    "2":45,
    "3":60,
    "4":70,
    "5":80
  };
  return map[wd] ?? 0;
}

fetch("monitor_data.csv")
.then(r=>r.text())
.then(text=>{

  const rows = text.trim().split(/\\r?\\n/);
  rows.shift();

  const data = [];

  rows.forEach(row=>{
    const p = row.split(",");

    if(p.length<3) return;

    data.push({
      process: p[0].trim(),
      wd: Number(p[1]),
      expected: Number(p[2])
    });
  });

  // pegar último WD válido
  const latest = {};

  data.forEach(d=>{
    if(d.wd <= CURRENT_WD){
      if(!latest[d.process] || d.wd > latest[d.process].wd){
        latest[d.process] = d;
      }
    }
  });

  const final = Object.values(latest);

  // KPI
  const global = Math.round(
    final.reduce((s,d)=>s+d.expected,0)/final.length
  );

  document.getElementById("kpi").innerText =
    "Expected: "+global+"%";

  // timeline progress
  document.getElementById("progress").style.width =
    global + "%";

  // posição NOW
  document.getElementById("now").style.left =
    wdToPercent(CURRENT_WD) + "%";

  // cards
  const div = document.getElementById("cards");
  div.innerHTML = "";

  final.forEach(d=>{
    const c = document.createElement("div");
    c.className="card";
    c.innerText = d.process + " → " + d.expected + "%";
    div.appendChild(c);
  });

});

</script>

</body>
</html>
