<!DOCTYPE html>
<html>
<head>
<title>SMART CLOSING – EXECUTION MONITOR</title>

<style>
body {
  background:#0b0f14;
  color:white;
  font-family:Arial;
  padding:20px;
}

h1 {margin-bottom:10px;}

.kpi {
  font-size:20px;
  margin-bottom:20px;
}

/* TIMELINE */
.timeline {
  position:relative;
  height:180px;
  border-top:2px solid #888;
  margin-top:40px;
}

/* progresso */
.progress {
  position:absolute;
  top:-2px;
  height:4px;
  background:#00c3ff;
  width:0%;
}

/* NOW */
.now {
  position:absolute;
  top:-20px;
  border-left:3px solid #00c3ff;
  height:140px;
}

.now label {
  position:absolute;
  top:-20px;
  left:-10px;
  font-size:12px;
}

/* labels WD */
.wd {
  position:absolute;
  top:20px;
  font-size:12px;
}

/* EVENTOS */
.event {
  position:absolute;
  top:80px;
  padding:8px 10px;
  border-radius:6px;
  font-size:12px;
}

.red { background:#e74c3c; }
.orange { background:#f39c12; }
.blue { background:#34495e; }
</style>

</head>

<body>

<h1>SMART CLOSING – EXECUTION MONITOR</h1>

<div id="kpi" class="kpi">Loading...</div>

<div class="timeline">

  <div id="progress" class="progress"></div>

  <div id="now" class="now">
    <label>NOW</label>
  </div>

  <!-- WD labels -->
  <div class="wd" style="left:0%">WD-3</div>
  <div class="wd" style="left:15%">WD-1</div>
  <div class="wd" style="left:30%">WD1</div>
  <div class="wd" style="left:45%">WD2</div>
  <div class="wd" style="left:60%">WD3</div>
  <div class="wd" style="left:75%">WD4</div>
  <div class="wd" style="left:90%">WD5</div>

  <!-- EVENTS (wireframe original) -->
  <div class="event orange" style="left:5%">Pre-Close Checks</div>
  <div class="event red" style="left:15%">Data Load</div>
  <div class="event red" style="left:30%">Accruals</div>
  <div class="event orange" style="left:55%">Consolidation</div>
  <div class="event blue" style="left:75%">Reporting</div>

</div>

<script>

// CONFIG
const CURRENT_WD = 3;

// WD → posição visual
function wdToPosition(wd){
  const map = {
    "-3":0,
    "-2":5,
    "-1":15,
    "1":30,
    "2":45,
    "3":60,
    "4":75,
    "5":90
  };
  return map[String(wd)] ?? 0;
}

// carregar CSV
fetch("monitor_data.csv")
.then(r=>r.text())
.then(text=>{

  const rows = text.split(/\r?\n/);

  let data = [];

  rows.forEach(row=>{

    if(!row || row.trim()==="") return;

    const parts = row.split(",");

    if(parts.length < 3) return;

    const process = parts[0].trim();
    const wd = Number(parts[1]);
    const expected = Number(parts[2]);

    if(isNaN(wd) || isNaN(expected)) return;

    data.push({process, wd, expected});
  });

  // pegar último WD por processo
  let latest = {};

  data.forEach(d=>{
    if(d.wd <= CURRENT_WD){
      if(!latest[d.process] || d.wd > latest[d.process].wd){
        latest[d.process] = d;
      }
    }
  });

  let final = Object.values(latest);

  if(final.length === 0){
    document.getElementById("kpi").innerText = "Sem dados";
    return;
  }

  // KPI
  let global = Math.round(
    final.reduce((s,d)=>s+d.expected,0) / final.length
  );

  document.getElementById("kpi").innerText =
    "Expected Progress: " + global + "%";

  // TIMELINE
  let pos = wdToPosition(CURRENT_WD);

  // progresso até WD atual
  document.getElementById("progress").style.width = pos + "%";

  // NOW
  document.getElementById("now").style.left = pos + "%";

});

</script>

</body>
</html>
``
