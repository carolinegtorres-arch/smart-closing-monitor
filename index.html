
<!DOCTYPE html>
<html>
<head>
<title>SMART CLOSING – EXECUTION MONITOR</title>

<style>
body {
  background:#0b0f14;
  color:white;
  font-family:Arial;
  padding:20px;
}

h1 { margin-bottom:10px; }

/* STATUS */
.status {
  font-size:18px;
  margin-bottom:10px;
}

.kpi {
  font-size:22px;
  margin-bottom:20px;
}

/* TIMELINE */
.timeline {
  position:relative;
  height:180px;
  border-top:2px solid #888;
  margin-top:40px;
}

.progress {
  position:absolute;
  top:-2px;
  height:4px;
  background:#00c3ff;
  width:0%;
}

.now {
  position:absolute;
  top:-20px;
  border-left:3px solid #00c3ff;
  height:140px;
}

.now label {
  position:absolute;
  top:-20px;
  left:-10px;
  font-size:12px;
}

/* WD labels */
.wd {
  position:absolute;
  top:20px;
  font-size:12px;
}

/* EVENTS */
.event {
  position:absolute;
  top:90px;
  padding:8px 10px;
  border-radius:6px;
  font-size:12px;
}

/* ACTIONS */
.actions {
  margin-top:30px;
  font-size:14px;
}
</style>

</head>

<body>

<h1>SMART CLOSING – EXECUTION MONITOR</h1>

<div id="status" class="status"></div>
<div id="kpi" class="kpi"></div>

<div class="timeline">

  <div id="progress" class="progress"></div>

  <div id="now" class="now">
    <label>NOW</label>
  </div>

  <!-- WD labels -->
  <div class="wd" style="left:0%">WD-3</div>
  <div class="wd" style="left:15%">WD-1</div>
  <div class="wd" style="left:30%">WD1</div>
  <div class="wd" style="left:45%">WD2</div>
  <div class="wd" style="left:60%">WD3</div>
  <div class="wd" style="left:75%">WD4</div>
  <div class="wd" style="left:90%">WD5</div>

  <!-- EVENTS -->
  <div class="event" data-wd="-1">Data Load</div>
  <div class="event" data-wd="1">Accruals</div>
  <div class="event" data-wd="3">Consolidation</div>
  <div class="event" data-wd="4">Reporting</div>

</div>

<div id="actions" class="actions"></div>

<script>

const CURRENT_WD = 3;

// posição WD
function wdToPosition(wd){
  const map = {
    "-3":0,
    "-2":5,
    "-1":15,
    "1":30,
    "2":45,
    "3":60,
    "4":75,
    "5":90
  };
  return map[String(wd)] ?? 0;
}

// carregar CSV
fetch("monitor_data.csv")
.then(r=>r.text())
.then(text=>{

  const rows = text.split(/\r?\n/);

  let data = [];

  rows.forEach(row => {

    if(!row || row.trim()==="") return;

    const parts = row.split(",");

    if(parts.length !== 3) return;

    const process = parts[0].trim();
    const wd = parseFloat(parts[1]);
    const expected = parseFloat(parts[2]);

    if(isNaN(wd) || isNaN(expected)) return;

    data.push({process, wd, expected});
  });

  // último WD por processo
  let latest = {};

  data.forEach(d=>{
    if(d.wd <= CURRENT_WD){
      if(!latest[d.process] || d.wd > latest[d.process].wd){
        latest[d.process] = d;
      }
    }
  });

  let final = Object.values(latest);

  if(final.length === 0){
    document.getElementById("kpi").innerText = "Sem dados";
    return;
  }

  // KPI
  let global = Math.round(
    final.reduce((s,d)=>s+d.expected,0) / final.length
  );

  document.getElementById("kpi").innerText =
    "Expected Progress: " + global + "%";

  // STATUS EXECUTIVO
  let status = "";
  if(global >= 65){
    status = "🟢 Closing on track";
  } else if(global >= 50){
    status = "🟡 Attention required";
  } else {
    status = "🔴 Closing at risk";
  }

  document.getElementById("status").innerText = status;

  // timeline posição
  let pos = wdToPosition(CURRENT_WD);

  document.getElementById("progress").style.width = pos + "%";
  document.getElementById("now").style.left = pos + "%";

  // eventos inteligentes
  document.querySelectorAll(".event").forEach(el => {

    const wd = parseInt(el.dataset.wd);

    el.style.left = wdToPosition(wd) + "%";

    if (wd < CURRENT_WD) {
      el.style.background = "#e74c3c"; // atraso
    } else if (wd === CURRENT_WD) {
      el.style.background = "#00c3ff"; // agora
    } else {
      el.style.background = "#34495e"; // futuro
    }

  });

  // WHERE TO ACT
  let critical = final.filter(d => d.expected < 50);

  let actionsDiv = document.getElementById("actions");

  actionsDiv.innerHTML = "<h3>Where to act:</h3>";

  if(critical.length === 0){
    actionsDiv.innerHTML += "✅ No critical risks";
  } else {
    critical.forEach(c => {
      let el = document.createElement("div");
      el.innerText =
        "⚠️ " + c.process + " below expected (" + c.expected + "%)";
      actionsDiv.appendChild(el);
    });
  }

});

</script>

</body>
</html>

</body>
</html>
