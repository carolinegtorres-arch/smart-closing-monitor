<!DOCTYPE html>
<html>
<head>
  <title>Smart Closing Monitor</title>

  <style>
    body {
      background:#0b0f14;
      color:white;
      font-family:Arial;
      margin:0;
      padding:20px;
    }

    h1 {
      margin-bottom:20px;
    }

    /* KPI */
    .kpi {
      background:#111;
      padding:20px;
      border-radius:10px;
      margin-bottom:20px;
    }

    .kpi-value {
      font-size:32px;
      font-weight:bold;
    }

    /* TIMELINE */
    .timeline {
      position:relative;
      height:120px;
      margin:40px 0;
      border-top:2px solid #aaa;
    }

    .expected-line {
      position:absolute;
      top:60px;
      width:100%;
      border-top:2px dashed #888;
    }

    .actual-line {
      position:absolute;
      top:75px;
      width:0%;
      border-top:3px solid #00c3ff;
      transition:0.5s;
    }

    .now {
      position:absolute;
      top:-10px;
      border-left:3px solid #00c3ff;
      height:100px;
      left:65%;
    }

    /* CARDS */
    .grid {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:20px;
    }

    .card {
      background:#111;
      padding:15px;
      border-radius:10px;
    }

    .bar {
      height:6px;
      border-radius:3px;
      margin-top:10px;
    }

    .green { background:#2ecc71; }
    .yellow { background:#f39c12; }
    .red { background:#e74c3c; }

    /* ACTION */
    .actions {
      background:#111;
      padding:20px;
      border-radius:10px;
      margin-top:30px;
    }
  </style>
</head>

<body>

<h1>Smart Closing Monitor (Expected)</h1>

<!-- KPI -->
<div class="kpi">
  <div id="expectedLabel">Global Expected</div>
  <div class="kpi-value" id="globalExpected">--%</div>
</div>

<!-- TIMELINE -->
<div class="timeline">
  <div class="expected-line"></div>
  <div class="actual-line" id="actualLine"></div>

  <div class="now">
    <div style="position:absolute;top:-25px;color:#00c3ff;">NOW</div>
  </div>
</div>

<!-- CARDS -->
<div class="grid" id="cards"></div>

<!-- ACTION -->
<div class="actions">
  <h3>Where to Act Now</h3>
  <ul id="actions"></ul>
</div>

<script>

const CURRENT_WD = 3;

// cor
function getColor(value) {
  if (value >= 75) return "green";
  if (value >= 55) return "yellow";
  return "red";
}

// ✅ LER CSV
fetch("monitor_data.csv")
  .then(res => res.text())
  .then(text => {

    // ✅ quebra correta (resolve GitHub + Excel)
    const rows = text.match(/[^\r\n]+/g);

    rows.shift(); // remove header

    const parsed = [];

    rows.forEach(row => {
      const parts = row.split(",");

    // ✅ lógica WD
    const data = Object.values(
      parsed
        .filter(d => d.WD <= CURRENT_WD)
        .reduce((acc, curr) => {
          if (!acc[curr.process] || curr.WD > acc[curr.process].WD) {
            acc[curr.process] = curr;
          }
          return acc;
        }, {})
    );

    // ✅ GLOBAL
    const global = Math.round(
      data.reduce((acc, d) => acc + d.expected, 0) / data.length
    );

    document.getElementById("globalExpected").innerText = global + "%";
    document.getElementById("expectedLabel").innerText =
      "Global Expected (WD" + CURRENT_WD + ")";

    // ✅ TIMELINE
    const timeline = document.getElementById("actualLine");
    timeline.style.width = global + "%";

    // ✅ CARDS
    const container = document.getElementById("cards");
    container.innerHTML = "";

    data.forEach(d => {

      const color = getColor(d.expected);

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div><strong>${d.process}</strong></div>
        <div>${d.expected}%</div>
        <div class="bar ${color}" style="width:${d.expected}%"></div>
        <div style="font-size:10px;color:#aaa;margin-top:5px;">
          WD base: ${d.WD}
        </div>
      `;

      container.appendChild(card);
    });

    // ✅ ACTIONS
    const actions = document.getElementById("actions");
    actions.innerHTML = "";

    data
      .filter(d => d.expected < 55)
      .forEach(d => {
        const item = document.createElement("li");
        item.innerText = `${d.process} abaixo do esperado (${d.expected}%)`;
        actions.appendChild(item);
      });

  });

</script>

</body>
</html>
