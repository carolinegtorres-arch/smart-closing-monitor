<!DOCTYPE html>
<html>
<head>
  <title>Smart Closing Monitor</title>

  <style>
    body {
      background: #0b0f14;
      color: white;
      font-family: Arial;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .kpi {
      background: #111;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 30px;
    }

    .kpi-value {
      font-size: 32px;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .card {
      background: #111;
      padding: 15px;
      border-radius: 10px;
    }

    .bar {
      height: 6px;
      border-radius: 3px;
      margin-top: 10px;
    }

    .green { background: #2ecc71; }
    .yellow { background: #f39c12; }
    .red { background: #e74c3c; }

    .actions {
      background: #111;
      padding: 20px;
      border-radius: 10px;
      margin-top: 30px;
    }
  </style>
</head>

<body>

<h1>Smart Closing Monitor (Expected)</h1>

<div class="kpi">
  <div>Global Expected (WD atual)</div>
  <div class="kpi-value" id="globalExpected">--%</div>
</div>

<div class="grid" id="cards"></div>

<div class="actions">
  <h3>Where to Act Now</h3>
  <ul id="actions"></ul>
</div>

<script>

const CURRENT_WD = 3; // 👈 ajuste aqui conforme o dia do fechamento

function getColor(value) {
  if (value >= 75) return "green";
  if (value >= 55) return "yellow";
  return "red";
}

// 👉 PUXAR CSV do GitHub
fetch("monitor_data.csv")
  .then(response => response.text())
  .then(text => {

    const rows = text.split("\n").slice(1);

    const parsed = rows.map(row => {
      const [process, wd, expected] = row.split(",");

      return {
        process: process?.trim(),
        WD: Number(wd),
        expected: Number(expected)
      };
    });

    // ✅ pegar o último WD válido por processo
    const data = Object.values(
      parsed
        .filter(d => d.WD <= CURRENT_WD)
        .reduce((acc, curr) => {
          if (!acc[curr.process] || curr.WD > acc[curr.process].WD) {
            acc[curr.process] = curr;
          }
          return acc;
        }, {})
    );

    // ✅ calcular global
    const global = Math.round(
      data.reduce((acc, d) => acc + d.expected, 0) / data.length
    );

    document.getElementById("globalExpected").innerText = global + "%";

    // ✅ montar cards
    const container = document.getElementById("cards");

    data.forEach(d => {
      const color = getColor(d.expected);

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div><strong>${d.process}</strong></div>
        <div>${d.expected}%</div>
        <div class="bar ${color}" style="width:${d.expected}%"></div>
        <div style="font-size:10px;color:#aaa;margin-top:5px;">
          WD base: ${d.WD}
        </div>
      `;

      container.appendChild(card);
    });

    // ✅ ações
    const actions = document.getElementById("actions");

    data
      .filter(d => d.expected < 55)
      .forEach(d => {
        const item = document.createElement("li");
        item.innerText = `${d.process} abaixo do esperado (${d.expected}%)`;
        actions.appendChild(item);
      });

  });

</script>

</body>
</html>
