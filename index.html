<!DOCTYPE html>
<html>
<head>
  <title>Smart Closing Monitor</title>

  <style>
    body {
      background:#0b0f14;
      color:white;
      font-family:Arial;
      padding:20px;
    }

    .card {
      background:#111;
      padding:15px;
      margin:10px 0;
    }
  </style>
</head>

<body>

<h1>Smart Closing Monitor</h1>

<h2 id="global">Carregando...</h2>

<div id="cards"></div>

<script>

fetch("monitor_data.csv")
.then(res => res.text())
.then(text => {

  const rows = text.trim().split(/\r?\n/);
  rows.shift(); // remove header

  const data = [];

  rows.forEach(row => {
    const parts = row.split(",");

    if(parts.length < 3) return;

    data.push({
      process: parts[0],
      wd: parseInt(parts[1]),
      expected: parseFloat(parts[2])
    });
  });

  const CURRENT_WD = 3;

  const latest = {};

  data.forEach(d => {
    if(d.wd <= CURRENT_WD){
      if(!latest[d.process] || d.wd > latest[d.process].wd){
        latest[d.process] = d;
      }
    }
  });

  const final = Object.values(latest);

  const global = Math.round(
    final.reduce((s,d)=>s+d.expected,0) / final.length
  );

  document.getElementById("global").innerText =
    "Expected: " + global + "%";

  const div = document.getElementById("cards");

  final.forEach(d => {
    const el = document.createElement("div");
    el.className = "card";
    el.innerText = d.process + " → " + d.expected + "%";
    div.appendChild(el);
  });

});

</script>

</body>
</html>
