<!DOCTYPE html>
<html>
<head>
  <title>Smart Closing Monitor</title>

<style>
body {
  background:#0b0f14;
  color:white;
  font-family:Arial;
  padding:20px;
}

h1 {
  margin-bottom:20px;
}

.kpi {
  font-size:24px;
  margin-bottom:30px;
}

/* TIMELINE */
.timeline {
  position:relative;
  height:120px;
  border-top:2px solid #888;
  margin-bottom:40px;
}

/* progresso */
.progress {
  position:absolute;
  top:-2px;
  height:3px;
  background:#00c3ff;
  width:0%;
}

/* linha NOW */
.now {
  position:absolute;
  top:-10px;
  border-left:3px solid #00c3ff;
  height:100px;
}

/* labels */
.label {
  position:absolute;
  top:20px;
  font-size:12px;
}

/* CARDS */
.card {
  background:#111;
  padding:10px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<h1>SMART CLOSING – EXECUTION MONITOR</h1>

<div class="kpi" id="kpi">Loading...</div>

<div class="timeline">
  <div id="progress" class="progress"></div>
  <div id="now" class="now"></div>

  <div class="label" style="left:0%">WD-3</div>
  <div class="label" style="left:20%">WD-1</div>
  <div class="label" style="left:40%">WD1</div>
  <div class="label" style="left:55%">WD2</div>
  <div class="label" style="left:70%">WD3</div>
  <div class="label" style="left:85%">WD4</div>
</div>

<div id="cards"></div>

<script>

const CURRENT_WD = 3;

// posição do NOW
function wdToPosition(wd){
  const map = {
    "-3":0,
    "-2":5,
    "-1":10,
    "1":40,
    "2":55,
    "3":70,
    "4":85,
    "5":95
  };
  return map[wd] ?? 0;
}

fetch("monitor_data.csv")
.then(r=>r.text())
.then(text=>{

  const rows = text.trim().split(/\r?\n/);
  rows.shift();

  const data = [];

  rows.forEach(row=>{
    const p = row.split(",");

    if(p.length < 3) return;

    data.push({
      process: p[0].trim(),
      wd: Number(p[1]),
      expected: Number(p[2])
    });
  });

  const latest = {};

  data.forEach(d=>{
    if(d.wd <= CURRENT_WD){
      if(!latest[d.process] || d.wd > latest[d.process].wd){
        latest[d.process] = d;
      }
    }
  });

  const final = Object.values(latest);

  const global = Math.round(
    final.reduce((s,d)=>s+d.expected,0) / final.length
  );

  document.getElementById("kpi").innerText =
    "Expected: " + global + "%";

  document.getElementById("progress").style.width =
    global + "%";

  document.getElementById("now").style.left =
    wdToPosition(CURRENT_WD) + "%";

  const div = document.getElementById("cards");
  div.innerHTML = "";

  final.forEach(d=>{
    const el = document.createElement("div");
    el.className = "card";
    el.innerText = d.process + " → " + d.expected + "%";
    div.appendChild(el);
  });

});

</script>

</body>
</html>
